<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Detail</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/main.css" />
</head>
<body>

  <!-- ── Header / Nav ──────────────────────────────────────── -->
  <header class="header">
    <div class="container">
      <a class="brand" href="index.html">🛍 V-Store</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="orders.html">My Orders</a>
        <a href="cart.html" class="cart-link">
          Cart <span id="cart-count">0</span>
        </a>
        <a href="login.html" id="auth-link">Login</a>
      </nav>
    </div>
  </header>

  <!-- ── Main Content ──────────────────────────────────────── -->
  <main>
    <div class="container">

      <!-- Back link -->
      <a href="index.html" class="btn btn-secondary btn-sm mb-3" style="display:inline-flex">
        ← Back to Products
      </a>

      <!-- Product detail — filled by JS -->
      <div id="product-detail"></div>

    </div>
  </main>

  <!-- ── Shared utilities ───────────────────────────────────── -->
  <script src="assets/main.js"></script>

  <!-- ── Page-specific logic ───────────────────────────────── -->
  <script>
    /**
     * Reads `?id=` from the URL, fetches that product from the API,
     * and renders the product detail layout.
     */
    async function loadProduct() {
      const params    = new URLSearchParams(window.location.search);
      const productId = params.get('id');
      const container = document.getElementById('product-detail');

      // Guard: no id in URL
      if (!productId) {
        container.innerHTML = `<p style="color:var(--color-danger)">⚠ No product ID specified.</p>`;
        return;
      }

      // Show skeleton while loading
      container.innerHTML = `<div class="product-detail skeleton" style="height:300px"></div>`;

      try {
        const res = await fetch(API_BASE + '/products/' + productId);

        if (!res.ok) throw new Error('Product not found');

        const p = await res.json();

        // Update page title
        document.title = p.title + ' — V-Store';

        container.innerHTML = `
          <div class="product-detail">

            <!-- Left: product image -->
            <img
              src="${p.image || ''}"
              alt="${p.title}"
              onerror="this.outerHTML='<div class=\'card-img-placeholder\' style=\'height:380px\'>🖼</div>'"
            />

            <!-- Right: product info -->
            <div class="info">
              <h2>${p.title}</h2>
              <p class="price">₹${p.price}</p>
              <p>${p.description}</p>

              <button
                class="btn btn-primary"
                style="min-width:180px"
                onclick="addToCart('${p._id}', '${p.title}', ${p.price})"
              >
                🛒 Add to Cart
              </button>
            </div>

          </div>
        `;

      } catch (err) {
        container.innerHTML = `
          <p style="color:var(--color-danger)">
            ⚠ ${err.message}. <a href="index.html">Go back</a>
          </p>`;
      }
    }

    loadProduct();
  </script>

</body>
</html>
